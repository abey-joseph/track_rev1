name: track
description: "Track — Track your life. A life-tracking mobile app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  auto_route: ^9.2.2
  bloc: ^9.0.0
  connectivity_plus: ^6.1.2
  dio: ^5.7.0
  drift: ^2.23.1
  equatable: ^2.0.7
  firebase_auth: ^5.5.1
  firebase_core: ^3.12.1
  firebase_crashlytics: ^4.3.3
  firebase_messaging: ^15.2.4
  fl_chart: ^0.70.2
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  flutter_local_notifications: ^18.0.1
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^9.2.4
  flutter_svg: ^2.0.16
  fpdart: ^1.1.0
  freezed_annotation: ^3.0.0
  get_it: ^8.0.3
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.2
  injectable: ^2.5.0
  intl: ^0.19.0
  json_annotation: ^4.9.0
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  sign_in_with_apple: ^6.1.4
  sqlite3_flutter_libs: ^0.5.28
  talker: ^4.7.0
  talker_bloc_logger: ^4.7.0
  talker_dio_logger: ^4.7.0
  talker_flutter: ^4.7.0
  workmanager: ^0.5.2

dev_dependencies:
  auto_route_generator: ^9.0.0
  bloc_test: ^10.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.23.1
  flutter_gen_runner: ^5.8.0
  flutter_test:
    sdk: flutter
  freezed: ^3.0.0
  injectable_generator: ^2.7.0
  json_serializable: ^6.9.4
  mocktail: ^1.0.4
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_gen:
  output: lib/gen/
  line_length: 80
  integrations:
    flutter_svg: true
