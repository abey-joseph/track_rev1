name: track
description: "Track — Track your life. A life-tracking mobile app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  auto_route: ^11.1.0
  bloc: ^9.0.0
  connectivity_plus: ^7.1.0
  dio: ^5.7.0
  drift: ^2.23.1
  envied: ^1.1.1
  equatable: ^2.0.7
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  firebase_crashlytics: ^5.1.0
  firebase_messaging: ^16.1.3
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  flutter_local_notifications: ^21.0.0
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.0.16
  fpdart: ^1.1.0
  freezed_annotation: ^3.0.0
  get_it: ^9.2.1
  google_fonts: ^8.0.2
  google_sign_in: ^7.2.0
  injectable: ^2.5.0
  intl: ^0.20.2
  json_annotation: ^4.9.0
  lottie: ^3.1.2
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  sqlite3_flutter_libs: ^0.6.0+eol
  talker: ^5.1.16
  talker_bloc_logger: ^5.1.16
  talker_dio_logger: ^5.1.16
  talker_flutter: ^5.1.16
  workmanager: ^0.9.0+3

dev_dependencies:
  auto_route_generator: ^10.5.0
  bloc_test: ^10.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.23.1
  envied_generator: ^1.1.1
  flutter_gen_runner: ^5.8.0
  flutter_test:
    sdk: flutter
  freezed: ^3.0.0
  injectable_generator: ^2.7.0
  json_serializable: ^6.9.4
  mocktail: ^1.0.4
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_gen:
  output: lib/gen/
  line_length: 80
  integrations:
    flutter_svg: true
